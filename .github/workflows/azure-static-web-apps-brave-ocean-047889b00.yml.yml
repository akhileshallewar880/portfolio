name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 187.127.130.128 >> ~/.ssh/known_hosts

      - name: Prepare VPS server
        run: |
          ssh -o StrictHostKeyChecking=no root@187.127.130.128 bash <<'REMOTE'
          set -e
          if ! command -v nginx &>/dev/null; then
            apt-get update -qq && apt-get install -y nginx
          fi
          mkdir -p /var/www/portfolio
          rm -rf /var/www/portfolio/*
          REMOTE

      - name: Upload build files
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/portfolio-app/browser/ \
            root@187.127.130.128:/var/www/portfolio/

      - name: Configure nginx and reload
        run: |
          ssh -o StrictHostKeyChecking=no root@187.127.130.128 bash <<'REMOTE'
          set -e
          cat > /etc/nginx/sites-available/portfolio <<'NGINX'
          server {
              listen 80;
              listen [::]:80;
              server_name 187.127.130.128 portfolio.vantrade.in;

              root /var/www/portfolio;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }

              add_header X-Frame-Options "SAMEORIGIN";
              add_header X-Content-Type-Options "nosniff";
              add_header X-XSS-Protection "1; mode=block";

              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
              gzip_min_length 1000;
          }
          NGINX
          ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/portfolio
          rm -f /etc/nginx/sites-enabled/default
          nginx -t
          systemctl enable nginx
          systemctl reload nginx
          REMOTE
